<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle de Estoque por Leitor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        input { width: 100%; padding: 15px; font-size: 18px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background: #eee; }
        button { margin-top: 15px; padding: 12px; font-size: 16px; cursor: pointer; }
        .remove-btn { padding: 5px 10px; background: #ff4d4d; color: white; border: none; cursor: pointer; }
        #status { margin-top: 10px; font-weight: bold; }
        #login-section { display: block; }
        #main-section, #payment-section { display: none; }
        .pay-btn { background: #009ee3; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 6px; }
        #payment-box { background: #fff; padding: 30px; text-align: center; border-radius: 8px; max-width: 450px; margin: 50px auto; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="login-section">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <div id="login-status"></div>
    </div>

    <div id="payment-section">
        <div id="payment-box">
            <h2>💳 Acesso ao Sistema</h2>
            <p>Para usar o sistema de estoque, é necessário o pagamento de <strong>R$ 20,00</strong>.</p>
            <button class="pay-btn" onclick="iniciarPagamento()">Pagar R$ 20,00</button>
            <div id="payment-status"></div>
            <button onclick="verificarPagamento()">Já paguei — Verificar</button>
            <button onclick="logout()">Sair</button>
        </div>
    </div>

    <div id="main-section">
        <h2>📦 Controle de Estoque por Código de Barras</h2>
        <input type="text" id="barcode" placeholder="Leia o código de barras aqui" autofocus>
        <table>
            <thead>
                <tr>
                    <th>Código do Produto</th>
                    <th>Peso Total (kg)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
        <div id="status">Carregando dados do Firebase...</div>
        <button onclick="exportarCSV()">📤 Exportar para Excel</button>
        <button onclick="logout()">Sair</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJBdK9I-jtg9ujTc9Xsxr-hnPfkId4wIU",
            authDomain: "pdv1-77632.firebaseapp.com",
            databaseURL: "https://pdv1-77632-default-rtdb.firebaseio.com",
            projectId: "pdv1-77632",
            storageBucket: "pdv1-77632.firebasestorage.app",
            messagingSenderId: "246033791117",
            appId: "1:246033791117:web:7b70b511ea8d8c5ba1cac4",
            measurementId: "G-NTG13SG6VM"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const estoqueRef = db.ref("estoque");

        let estoque = {};
        let usuarioAtual = null;
        const statusEl = document.getElementById("status");
        const loginStatusEl = document.getElementById("login-status");
        const paymentStatusEl = document.getElementById("payment-status");

        function mostrar(secao) {
            document.getElementById("login-section").style.display = secao === "login" ? "block" : "none";
            document.getElementById("payment-section").style.display = secao === "payment" ? "block" : "none";
            document.getElementById("main-section").style.display = secao === "main" ? "block" : "none";
        }

        auth.onAuthStateChanged((user) => {
            usuarioAtual = user;
            if (user) {
                verificarPagamento();
            } else {
                mostrar("login");
            }
        });

        // Verifica no Firebase se o usuário já pagou
        function verificarPagamento() {
            if (!usuarioAtual) return;
            db.ref("pagamentos/" + usuarioAtual.uid).once("value").then((snap) => {
                const dados = snap.val();
                if (dados && dados.pago === true) {
                    mostrar("main");
                    carregarDados();
                } else {
                    mostrar("payment");
                    paymentStatusEl.textContent = "Pagamento ainda não identificado.";
                }
            });
        }

        // Cria a preferência e redireciona pro checkout do Mercado Pago
        function iniciarPagamento() {
            paymentStatusEl.textContent = "Gerando pagamento...";
            fetch("/api/criar-pagamento", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    uid: usuarioAtual.uid,
                    email: usuarioAtual.email
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    paymentStatusEl.textContent = "Erro: " + (data.error || "desconhecido");
                }
            })
            .catch(err => {
                paymentStatusEl.textContent = "Erro ao criar pagamento: " + err.message;
            });
        }

        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    loginStatusEl.textContent = "Login bem-sucedido!";
                    loginStatusEl.style.color = "green";
                })
                .catch((error) => {
                    console.error(error);
                    loginStatusEl.textContent = "Erro no login: " + error.message;
                    loginStatusEl.style.color = "red";
                });
        }

        function logout() {
            auth.signOut().catch((error) => console.error("Erro ao sair:", error));
        }

        function carregarDados() {
            estoqueRef.on("value", (snapshot) => {
                const data = snapshot.val();
                estoque = data || {};
                Object.keys(estoque).forEach(cod => {
                    if (typeof estoque[cod].pesoTotal !== 'number') {
                        delete estoque[cod];
                    } else {
                        delete estoque[cod].quantidade;
                    }
                });
                atualizarTabela();
                statusEl.textContent = "Dados sincronizados com o Firebase";
                statusEl.style.color = "green";
            }, (error) => {
                console.error(error);
                statusEl.textContent = "Erro ao conectar com o Firebase: " + error.message;
                statusEl.style.color = "red";
            });
        }

        document.getElementById("barcode").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                let codigo = this.value.trim();
                this.value = "";
                if (codigo.length < 11 || codigo[0] !== "2") {
                    alert("Código inválido");
                    return;
                }
                let codProduto = codigo.substring(1, 5);
                let pesoFinal = parseInt(codigo.slice(-6));
                if (isNaN(pesoFinal)) {
                    alert("Peso inválido no código");
                    return;
                }
                let pesoKg = pesoFinal / 10000;
                if (!estoque[codProduto]) {
                    estoque[codProduto] = { pesoTotal: 0 };
                }
                estoque[codProduto].pesoTotal += pesoKg;
                estoqueRef.set(estoque).then(() => {
                    atualizarTabela();
                }).catch((error) => {
                    console.error("Erro ao salvar:", error);
                    alert("Erro ao salvar no Firebase: " + error.message);
                });
            }
        });

        function removerItem(cod) {
            if (confirm(`Tem certeza que deseja remover o item ${cod}?`)) {
                delete estoque[cod];
                estoqueRef.set(estoque).then(() => {
                    atualizarTabela();
                }).catch((error) => {
                    console.error("Erro ao remover:", error);
                    alert("Erro ao remover no Firebase: " + error.message);
                });
            }
        }

        function atualizarTabela() {
            let tbody = document.getElementById("tabela");
            tbody.innerHTML = "";
            let keys = Object.keys(estoque).sort((a, b) => a.localeCompare(b));
            for (let cod of keys) {
                if (typeof estoque[cod].pesoTotal === 'number') {
                    let pesoFormatado = estoque[cod].pesoTotal.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
                    tbody.innerHTML += `
                        <tr>
                            <td>${cod}</td>
                            <td>${pesoFormatado}</td>
                            <td><button class="remove-btn" onclick="removerItem('${cod}')">Remover</button></td>
                        </tr>
                    `;
                }
            }
        }

        function exportarCSV() {
            let csv = "C\u00F3digo do Produto;Peso Total (kg)\n";
            let keys = Object.keys(estoque).sort((a, b) => a.localeCompare(b));
            for (let cod of keys) {
                if (typeof estoque[cod].pesoTotal === 'number') {
                    let pesoStr = estoque[cod].pesoTotal.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
                    csv += `${cod};${pesoStr}\n`;
                }
            }
            let bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            let blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8;" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "estoque.csv";
            link.click();
        }
    </script>
</body>
</html>
